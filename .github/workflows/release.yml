name: Build and Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'Info.plist'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Bump version
      id: bump
      run: |
        SHORT_VERSION=$(grep -A1 CFBundleShortVersionString Info.plist | grep '<string>' | sed 's/.*<string>\(.*\)<\/string>/\1/')
        BUILD_NUMBER=$(grep -A1 'CFBundleVersion' Info.plist | grep '<string>' | head -1 | sed 's/.*<string>\(.*\)<\/string>/\1/')

        IFS='.' read -ra PARTS <<< "$SHORT_VERSION"
        MAJOR=${PARTS[0]:-0}
        MINOR=${PARTS[1]:-1}
        PATCH=${PARTS[2]:-0}
        NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
        NEW_BUILD=$((BUILD_NUMBER + 1))

        echo "Bumping $SHORT_VERSION -> $NEW_VERSION (build $NEW_BUILD)"

        sed -i '' "/<key>CFBundleShortVersionString<\/key>/{n;s|<string>.*</string>|<string>$NEW_VERSION</string>|}" Info.plist
        sed -i '' "/<key>CFBundleVersion<\/key>/{n;s|<string>.*</string>|<string>$NEW_BUILD</string>|}" Info.plist

        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "build=$NEW_BUILD" >> $GITHUB_OUTPUT

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build app
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Create DMG
      run: |
        chmod +x create-dmg.sh
        ./create-dmg.sh

    - name: Commit version bump and tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Info.plist
        git commit -m "Bump version to ${{ steps.bump.outputs.version }} (build ${{ steps.bump.outputs.build }})"
        git tag "v${{ steps.bump.outputs.version }}"
        git push
        git push --tags

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.bump.outputs.version }}
        files: |
          build/ClaudeUsage.dmg
        body: |
          ## Claude Usage Menubar App v${{ steps.bump.outputs.version }}

          > 🤖 Built by Claude, for Claude

          A macOS menubar application that displays your Claude API usage limits in real-time.

          ### Installation

          1. Download `ClaudeUsage.dmg` below
          2. Open the DMG file
          3. Drag `ClaudeUsage.app` to your Applications folder
          4. Launch the app from Applications
          5. Click the menubar icon and select "Settings..." to configure your Claude session key

          ### Requirements

          - macOS 13.0 or later

          ### Getting Your Session Key

          1. Open [claude.ai](https://claude.ai) in your browser
          2. Open Developer Tools (Cmd+Option+I or F12)
          3. Go to **Application** > **Cookies** > `https://claude.ai`
          4. Find and copy the value of the `sessionKey` cookie
          5. Paste it into the Settings window in the app

          ### Features

          - ✅ Smart usage indicators that compare actual vs expected usage based on time elapsed
          - 📊 Track multiple metrics: 5-hour limit, 7-day limit (all models), 7-day limit (Sonnet)
          - ⏰ Relative time display ("Resets in 4h 23m")
          - 🔄 Auto-refresh every 5 minutes
          - 💾 Persistent settings storage
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
